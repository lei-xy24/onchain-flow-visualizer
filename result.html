<!doctype html>

  <body>
    <div id="app"></div>
    <script>
      // Set this to the real endpoint, for example: https://api.example.com/flow
      const BACKEND_API_URL = "";
      let flowData = null;
      let currentRequest = null;

      const chainOptions = [
        { id: "eth", label: "ETH" },
        { id: "bsc", label: "BSC" },
        { id: "polygon", label: "Polygon" },
      ];
      const EVM_ADDRESS_PATTERN = /^0x[0-9a-fA-F]{40}$/;
      const TX_HASH_PATTERN = /^0x[0-9a-fA-F]{64}$/;
      const RAW_AMOUNT_PATTERN = /^\d+$/;
      let selectedAddress = "";
      let activeFlow = null;
      let flowConnectionFrame = 0;

      async function loadFlowData(chain, address) {
        currentRequest = { chain, address };
        renderDataState(
          "正在查询资金流数据",
          `正在向后端查询 ${chain.toUpperCase()} 地址 ${shortAddress(address)}。`,
        );

        try {
          const response = await fetch(buildFlowRequestUrl(chain, address), {
            cache: "no-store",
            headers: { Accept: "application/json" },
          });
          if (!response.ok) {
            if (!BACKEND_API_URL.trim() && response.status === 404) {
              flowData = createEmptyFlowResponse(chain, address);
              renderResult(chain, address);
              return;
            }
            throw new Error("HTTP " + response.status);
          }

          flowData = validateFlowResponse(
            await response.json(),
            chain,
            address,
          );
          renderResult(chain, address);
        } catch (error) {
          console.error("Failed to load flow data:", error);
          const message =
            location.protocol === "file:"
              ? "浏览器不允许 file:// 页面发送数据请求。请通过 GitHub Pages 或本地 HTTP 服务打开。"
              : "后端请求失败，或返回的 JSON 不符合约定格式。";
          renderDataState("JSON 读取失败", message, true);
        }
      }

      function createEmptyFlowResponse(chain, address) {
        return {
          chain,
          address,
          label: "No example data loaded",
          input: [],
          output: [],
        };
      }

      function renderDataState(title, message, allowRetry, showHome) {
        document.getElementById("app").innerHTML =
          '<main class="home-shell">' +
          '<section class="home-hero" aria-live="polite">' +
          '<div class="brand-mark" aria-hidden="true">DF</div>' +
          '<p class="eyebrow">区块链与数字金融服务安全测试平台</p>' +
          "<h1>" +
          escapeHtml(title) +
          "</h1>" +
          '<p class="hero-copy">' +
          escapeHtml(message) +
          "</p>" +
          (allowRetry
            ? '<div class="quick-examples"><button id="retry-data" type="button">重新读取</button></div>'
            : "") +
          (showHome
            ? '<div class="quick-examples"><a class="back-link" href="./index.html">返回搜索</a></div>'
            : "") +
          "</section></main>";

        const retryButton = document.getElementById("retry-data");
        if (retryButton && currentRequest) {
          retryButton.addEventListener("click", () => {
            loadFlowData(currentRequest.chain, currentRequest.address);
          });
        }
      }

      function buildFlowRequestUrl(chain, address) {
        if (BACKEND_API_URL.trim()) {
          const url = new URL(BACKEND_API_URL, location.href);
          url.searchParams.set("chain", chain);
          url.searchParams.set("address", address);
          return url.toString();
        }

        return `./mock-api/${encodeURIComponent(chain)}/${encodeURIComponent(address.toLowerCase())}.json`;
      }

      function validateFlowResponse(value, requestedChain, requestedAddress) {
        const flow = requireObject(value, "flow response");
        const responseChain = normalizeChain(
          requireString(flow.chain, "flow response.chain"),
        );
        if (!responseChain || responseChain !== requestedChain) {
          throw new Error("flow response.chain does not match the request");
        }

        const responseAddress = requireString(
          flow.address,
          "flow response.address",
        );
        if (
          !isEvmAddress(responseAddress) ||
          responseAddress.toLowerCase() !== requestedAddress.toLowerCase()
        ) {
          throw new Error("flow response.address does not match the request");
        }

        if (flow.label !== undefined) {
          requireString(flow.label, "flow response.label");
        }
        const seenTransferIds = new Set();
        validateTransfers(flow.input, "flow response.input", seenTransferIds);
        validateTransfers(flow.output, "flow response.output", seenTransferIds);
        return value;
      }

      function validateTransfers(value, path, seenTransferIds) {
        if (!Array.isArray(value)) {
          throw new Error(`${path} must be an array`);
        }

        value.forEach((item, index) => {
          const itemPath = `${path}[${index}]`;
          const transfer = requireObject(item, itemPath);
          const id = requireString(transfer.id, `${itemPath}.id`);
          if (seenTransferIds.has(id)) {
            throw new Error(`duplicate transfer id: ${id}`);
          }
          seenTransferIds.add(id);

          const address = requireString(
            transfer.address,
            `${itemPath}.address`,
          );
          if (!isEvmAddress(address)) {
            throw new Error(`${itemPath}.address is invalid`);
          }

          const time = requireString(transfer.time, `${itemPath}.time`);
          if (Number.isNaN(Date.parse(time))) {
            throw new Error(`${itemPath}.time is invalid`);
          }

          const rawAmount = requireString(
            transfer.rawAmount,
            `${itemPath}.rawAmount`,
          );
          if (!RAW_AMOUNT_PATTERN.test(rawAmount)) {
            throw new Error(`${itemPath}.rawAmount must contain digits only`);
          }

          if (
            !Number.isInteger(transfer.decimals) ||
            transfer.decimals < 0 ||
            transfer.decimals > 255
          ) {
            throw new Error(
              `${itemPath}.decimals must be an integer from 0 to 255`,
            );
          }

          requireString(transfer.asset, `${itemPath}.asset`);
          if (
            transfer.assetAddress !== null &&
            !isEvmAddress(transfer.assetAddress)
          ) {
            throw new Error(
              `${itemPath}.assetAddress must be null or an EVM address`,
            );
          }

          const txHash = requireString(transfer.txHash, `${itemPath}.txHash`);
          if (!TX_HASH_PATTERN.test(txHash)) {
            throw new Error(`${itemPath}.txHash is invalid`);
          }
          if (transfer.tag !== undefined) {
            requireString(transfer.tag, `${itemPath}.tag`);
          }
        });
      }

      function requireObject(value, path) {
        if (!value || typeof value !== "object" || Array.isArray(value)) {
          throw new Error(`${path} must be an object`);
        }
        return value;
      }

      function requireString(value, path) {
        if (typeof value !== "string" || !value.trim()) {
          throw new Error(`${path} must be a non-empty string`);
        }
        return value;
      }

      function isEvmAddress(value) {
        return typeof value === "string" && EVM_ADDRESS_PATTERN.test(value.trim());
      }

      function getKnownAddresses(chain) {

      function getFlowByAddress(chain, address) {
        const chainKey = normalizeChain(chain);
        if (!chainKey || !flowData || flowData.chain !== chainKey) return null;

      }

      function normalizeChain(chain) {

      function scheduleFlowConnections() {
        if (!activeFlow) return;
        const draw = () => {
          flowConnectionFrame = 0;
          renderFlowConnections(activeFlow);
        };

        if (typeof requestAnimationFrame === "function") {
          if (flowConnectionFrame) cancelAnimationFrame(flowConnectionFrame);
          flowConnectionFrame = requestAnimationFrame(draw);
          return;
        }

        draw();
      }

      function renderFlowConnections(flow) {
        if (
          typeof document.querySelector !== "function" ||
          typeof document.createElementNS !== "function"
        ) {
          return;
        }

        const graph = document.querySelector(".flow-graph");
        if (
          !graph ||
          typeof graph.querySelector !== "function" ||
          typeof graph.getBoundingClientRect !== "function"
        ) {
          return;
        }

        const svg = graph.querySelector("[data-flow-lines]");
        const center = graph.querySelector("[data-flow-center]");
        if (!svg || !center) return;

        const graphRect = graph.getBoundingClientRect();
        if (!graphRect.width || !graphRect.height) return;

        while (svg.firstChild) {
          svg.removeChild(svg.firstChild);
        }

        svg.setAttribute(
          "viewBox",
          `0 0 ${formatSvgNumber(graphRect.width)} ${formatSvgNumber(graphRect.height)}`,
        );
        svg.setAttribute("width", formatSvgNumber(graphRect.width));
        svg.setAttribute("height", formatSvgNumber(graphRect.height));

        const centerRect = center.getBoundingClientRect();
        const scaleById = buildFlowVisualScales([
          ...flow.input,
          ...flow.output,
        ]);
        const namespace = "http://www.w3.org/2000/svg";

        ["input", "output"].forEach((direction) => {
          flow[direction].forEach((transfer, index) => {
            const node = graph.querySelector(
              `[data-flow-direction="${direction}"][data-flow-index="${index}"]`,
            );
            if (!node || typeof node.getBoundingClientRect !== "function") {
              return;
            }

            const nodeRect = node.getBoundingClientRect();
            const points =
              direction === "input"
                ? getFlowEndpoints(nodeRect, centerRect, graphRect)
                : getFlowEndpoints(centerRect, nodeRect, graphRect);
            const scale = scaleById.get(transfer.id) || defaultFlowVisualScale();
            const path = document.createElementNS(namespace, "path");
            path.classList.add("flow-connection", direction);
            path.setAttribute("d", buildFlowPath(points.start, points.end));
            path.style.setProperty("--flow-width", `${scale.width}px`);
            path.style.setProperty("--flow-gap", `${scale.gap}`);
            path.style.setProperty("--flow-duration", `${scale.duration}s`);
            path.style.setProperty("--flow-opacity", `${scale.opacity}`);

            const title = document.createElementNS(namespace, "title");
            title.textContent = `${direction === "input" ? "流入" : "流出"} ${formatRawAmount(transfer.rawAmount, transfer.decimals)} ${transfer.asset}`;
            path.appendChild(title);
            svg.appendChild(path);
          });
        });
      }

      function getFlowEndpoints(fromRect, toRect, graphRect) {
        const fromCenter = relativeCenter(fromRect, graphRect);
        const toCenter = relativeCenter(toRect, graphRect);
        const dx = toCenter.x - fromCenter.x;
        const dy = toCenter.y - fromCenter.y;

        if (Math.abs(dx) >= Math.abs(dy)) {
          const leftToRight = dx >= 0;
          return {
            start: {
              x: leftToRight
                ? fromRect.right - graphRect.left
                : fromRect.left - graphRect.left,
              y: fromCenter.y,
            },
            end: {
              x: leftToRight
                ? toRect.left - graphRect.left
                : toRect.right - graphRect.left,
              y: toCenter.y,
            },
          };
        }

        const topToBottom = dy >= 0;
        return {
          start: {
            x: fromCenter.x,
            y: topToBottom
              ? fromRect.bottom - graphRect.top
              : fromRect.top - graphRect.top,
          },
          end: {
            x: toCenter.x,
            y: topToBottom
              ? toRect.top - graphRect.top
              : toRect.bottom - graphRect.top,
          },
        };
      }

      function relativeCenter(rect, graphRect) {
        return {
          x: rect.left - graphRect.left + rect.width / 2,
          y: rect.top - graphRect.top + rect.height / 2,
        };
      }

      function buildFlowPath(start, end) {
        const dx = end.x - start.x;
        const dy = end.y - start.y;

        if (Math.abs(dx) >= Math.abs(dy)) {
          const direction = dx >= 0 ? 1 : -1;
          const curve = Math.max(34, Math.abs(dx) * 0.48);
          return [
            "M",
            formatSvgNumber(start.x),
            formatSvgNumber(start.y),
            "C",
            formatSvgNumber(start.x + direction * curve),
            formatSvgNumber(start.y),
            formatSvgNumber(end.x - direction * curve),
            formatSvgNumber(end.y),
            formatSvgNumber(end.x),
            formatSvgNumber(end.y),
          ].join(" ");
        }

        const direction = dy >= 0 ? 1 : -1;
        const curve = Math.max(34, Math.abs(dy) * 0.48);
        return [
          "M",
          formatSvgNumber(start.x),
          formatSvgNumber(start.y),
          "C",
          formatSvgNumber(start.x),
          formatSvgNumber(start.y + direction * curve),
          formatSvgNumber(end.x),
          formatSvgNumber(end.y - direction * curve),
          formatSvgNumber(end.x),
          formatSvgNumber(end.y),
        ].join(" ");
      }

      function buildFlowVisualScales(transfers) {
        const magnitudes = transfers.map(transferAmountMagnitude);
        const finiteMagnitudes = magnitudes.filter(Number.isFinite);
        const minMagnitude = finiteMagnitudes.length
          ? Math.min(...finiteMagnitudes)
          : 0;
        const maxMagnitude = finiteMagnitudes.length
          ? Math.max(...finiteMagnitudes)
          : 0;
        const scales = new Map();

        transfers.forEach((transfer, index) => {
          const magnitude = magnitudes[index];
          const rawRatio =
            maxMagnitude === minMagnitude
              ? 0.5
              : Number.isFinite(magnitude)
                ? (magnitude - minMagnitude) / (maxMagnitude - minMagnitude)
                : 0;
          const ratio = Math.sqrt(clamp(rawRatio, 0, 1));
          scales.set(transfer.id, {
            duration: formatSvgNumber(2.9 - ratio * 1.65),
            gap: formatSvgNumber(11.5 - ratio * 5.6),
            opacity: formatSvgNumber(0.55 + ratio * 0.35),
            width: formatSvgNumber(2 + ratio * 4.5),
          });
        });

        return scales;
      }

      function transferAmountMagnitude(transfer) {
        const rawAmount = String(transfer.rawAmount || "");
        if (!RAW_AMOUNT_PATTERN.test(rawAmount)) return Number.NEGATIVE_INFINITY;
        const normalized = rawAmount.replace(/^0+/, "");
        if (!normalized) return Number.NEGATIVE_INFINITY;

        const sampleLength = Math.min(15, normalized.length);
        const sample = Number(normalized.slice(0, sampleLength));
        if (!sample) return Number.NEGATIVE_INFINITY;

        return (
          Math.log10(sample) +
          (normalized.length - sampleLength) -
          transfer.decimals
        );
      }

      function defaultFlowVisualScale() {
        return {
          duration: "2.1",
          gap: "8.5",
          opacity: "0.75",
          width: "3.5",
        };
      }

      function clamp(value, min, max) {
        return Math.min(Math.max(value, min), max);
      }

      function formatSvgNumber(value) {
        return Number(value).toFixed(2).replace(/\.?0+$/, "");
      }

      function initializeFlowConnectionResize() {
        if (
          typeof window !== "undefined" &&
          typeof window.addEventListener === "function"
        ) {
          window.addEventListener("resize", scheduleFlowConnections);
        }
      }

      function buildDirectedTransfers(flow) {
        return [
          ...flow.input.map((transfer) => ({
            ...transfer,
            direction: "input",
          })),
          ...flow.output.map((transfer) => ({
            ...transfer,
            direction: "output",
          })),
        ];
      }

      function buildAccountSummaries(flow) {
        const centerTransfers = [
          ...flow.input.map((transfer) => ({ ...transfer, direction: "input" })),
          ...flow.output.map((transfer) => ({ ...transfer, direction: "output" })),
        ];
        const summaries = [
          {
            address: flow.address,
            role: "center",
            tag: flow.label,
            transfers: centerTransfers,
          },
        ];

        ["input", "output"].forEach((direction) => {
          flow[direction].forEach((transfer) => {
            const existing = summaries.find(
              (summary) =>
                summary.address.toLowerCase() === transfer.address.toLowerCase(),
            );
            if (existing) {
              existing.transfers.push({ ...transfer, direction });
              if (existing.role !== "center" && existing.role !== direction) {
                existing.role = "both";
              }
            } else {
              summaries.push({
                address: transfer.address,
                role: direction,
                tag: transfer.tag,
                transfers: [{ ...transfer, direction }],
              });
            }
          });
        });

        return summaries;
      }

      function roleLabel(role) {
        if (role === "center") return "中心账户";
        if (role === "both") return "双向账户";
        return role === "input" ? "流入账户" : "流出账户";
      }

      function formatAmount(transfer) {
        return `${formatRawAmount(transfer.rawAmount, transfer.decimals)} ${escapeHtml(transfer.asset)}`;
      }

      function formatTransferTotal(transfers) {
        if (!transfers.length) return "0";
        const totals = new Map();
        transfers.forEach((transfer) => {
          const key = assetKey(transfer);
          const existing = totals.get(key);
          totals.set(
            key,
            existing
              ? {
                  ...existing,
                  rawAmount: addRawAmounts(
                    existing.rawAmount,
                    transfer.rawAmount,
                  ),
                }
              : { ...transfer },
          );
        });

        const symbolCounts = new Map();
        totals.forEach((total) => {
          symbolCounts.set(
            total.asset,
            (symbolCounts.get(total.asset) || 0) + 1,
          );
        });

        return [...totals.values()]
          .map((total) => {
            const qualifier =
              (symbolCounts.get(total.asset) || 0) > 1 && total.assetAddress
                ? ` (${shortAddress(total.assetAddress)})`
                : "";
            return `${formatRawAmount(total.rawAmount, total.decimals)} ${escapeHtml(total.asset)}${qualifier}`;
          })
          .join(" + ");
      }

      function assetKey(transfer) {
        return [
          transfer.asset.toLowerCase(),
          transfer.assetAddress
            ? transfer.assetAddress.toLowerCase()
            : "native",
          transfer.decimals,
        ].join(":");
      }

      function addRawAmounts(left, right) {
        return (BigInt(left) + BigInt(right)).toString();
      }

      function formatRawAmount(rawAmount, decimals) {
        const normalized = rawAmount.replace(/^0+(?=\d)/, "");
        if (decimals === 0) return groupDigits(normalized);

        const padded = normalized.padStart(decimals + 1, "0");
        const integer = padded.slice(0, -decimals);
        const fraction = padded.slice(-decimals).replace(/0+$/, "");
        return fraction
          ? `${groupDigits(integer)}.${fraction}`
          : groupDigits(integer);
      }

      function groupDigits(value) {
        return value.replace(/\B(?=(\d{3})+(?!\d))/g, ",");
      }

      function formatTime(time) {
        return new Intl.DateTimeFormat("zh-CN", {
          month: "2-digit",
          day: "2-digit",
          hour: "2-digit",
          minute: "2-digit",
        }).format(new Date(time));
      }

      function shortAddress(address) {
        if (!address || address.length <= 14) return escapeHtml(address || "");
        return `${escapeHtml(address.slice(0, 8))}...${escapeHtml(address.slice(-6))}`;
      }

      function shortHash(hash) {
        if (!hash || hash.length <= 16) return escapeHtml(hash || "");
        return `${escapeHtml(hash.slice(0, 10))}...${escapeHtml(hash.slice(-8))}`;
      }

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;")
          .replace(/'/g, "&#039;");
      }

      initializeFlowConnectionResize();
      initializeResultPage();
    </script>
  </body>
</html>
